<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>集站 - 链接变导航</title>
<meta name="description" content="粘贴链接，一键生成精美导航站">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#4F6EF7">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css">

</head>
<body>

<div class="app" id="app">

  <!-- ===== Header ===== -->
  <header class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="brand-icon">⚡</span>
        <span class="brand-name">集站</span>
        <span class="brand-tag">链接变导航</span>
      </div>
      <button class="header-guide" id="guideBtn">
        <span>📖</span> 使用说明
      </button>
      <a class="header-gh" href="https://github.com/anyang0188/jizhan" target="_blank" title="GitHub 开源">🐙</a>
    </div>
  </header>

  <!-- ===== Main Layout ===== -->
  <main class="app-main">

    <!-- ===== Left Panel: Input ===== -->
    <section class="panel panel-input">

      <!-- 导航站名称 -->
      <div class="input-group">
        <label class="input-label" for="siteTitle">导航站名称</label>
        <input class="input-field" id="siteTitle" placeholder="输入导航站名称" value="我的导航站">
      </div>

      <!-- 副标题 -->
      <div class="input-group">
        <label class="input-label" for="siteSubtitle">副标题（可选）</label>
        <input class="input-field" id="siteSubtitle" placeholder="给导航站加一句描述" value="">
      </div>

      <!-- 主题 -->
      <div class="input-group">
        <label class="input-label">背景主题</label>
        <div class="theme-picker" id="themePicker"></div>
      </div>

      <!-- 链接输入 -->
      <div class="input-card">
        <div class="input-card-header">
          <span class="input-card-title">📋 粘贴你的链接</span>
          <div class="header-btns">
            <button class="btn-sample" id="clearBtn">清空</button>
            <button class="btn-sample" id="sampleBtn">填入示例</button>
          </div>
        </div>
        <textarea class="link-input" id="linkInput"
          placeholder="https://github.com&#10;https://www.bilibili.com/ 哔哩哔哩（视频）&#10;https://chat.deepseek.com DeepSeek"
        ></textarea>
        <div class="input-footer">
          <span class="link-count" id="linkCount">实时检测 URL…</span>
          <button class="btn btn-primary" id="parseBtn">解析链接</button>
        </div>
        <div class="format-tip" id="formatTip">支持 3 种格式：纯链接 / 链接+中文名 / 链接+名（分类）</div>
      </div>

    </section>

    <!-- ===== Right Panel: Results ===== -->
    <section class="panel panel-results">

      <!-- 空状态 -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🔗</div>
        <h3 class="empty-title">还没开始呢</h3>
        <p class="empty-desc">左边粘贴链接，或点「填入示例」快速体验效果</p>
      </div>

      <!-- 分类预览 -->
      <div class="results-card" id="previewCard" style="display:none;">
        <div class="results-header">
          <h2 class="results-title" id="previewTitle">📊 分类结果</h2>
          <div class="results-header-right">
            <span class="results-badge" id="previewHint"></span>
            <div class="results-header-actions">
              <button class="btn btn-export" id="exportBtn">📥 生成链页</button>
              <button class="btn btn-reset" id="resetBtn">🔄 重新开始</button>
            </div>
          </div>
        </div>
        <div class="category-list" id="categoryList"></div>
      </div>

    </section>

  </main>
</div>

<!-- 弹窗容器 -->
<div id="modalContainer"></div>

<script src="js/classifier.js"></script>
<script src="js/htmlGenerator.js"></script>
<script src="js/app.js"></script>
</body>
</html>
